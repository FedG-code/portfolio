  - generic [ref=e37]:
    - paragraph [ref=e38]: 01 - Combat System
    - heading "Combat" [level=2] [ref=e39]
    - generic [ref=e40]:
      - img "Ultimate ability and boss fight gameplay" [ref=e42]
      - generic [ref=e43]:
        - paragraph [ref=e44]: The combat system runs on a finite state machine where each attack is a distinct state node chained into combo sequences. Hitbox activation uses per-state timers rather than animation signals, so attack windows can be tuned independently from animation timing.
        - paragraph [ref=e45]: Input buffering captures player inputs during any attack state. The transition to the next hit only fires when the combo timer drops below a threshold while the buffer flag is set. Combos feel responsive without allowing instant cancels.
    - generic [ref=e46]:
      - generic [ref=e47]:
        - paragraph [ref=e48]: "The second hit introduces directional branching: neutral input leads to the standard finisher, up-input triggers a launcher that sends enemies airborne for air-combo follow-ups, and horizontal input triggers a forward lunge. The player gets meaningful mid-combo choices without complex input parsing."
        - paragraph [ref=e49]: Berserk mode activates a parallel combo chain with its own state sequence and a heavy finisher, paired with a full character transformation that swaps the moveset entirely.
      - generic [ref=e51]: Berserk / laser eye GIF
  - generic [ref=e53]:
