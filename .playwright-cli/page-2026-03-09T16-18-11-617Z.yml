    - paragraph [ref=e31]:
      - text: 01 - Coffin-Likker
      - generic [ref=e32]: In Development
    - heading "Muk (working title)" [level=2] [ref=e33]
    - generic [ref=e34]:
      - generic [ref=e36]: Vision system screenshot
      - generic [ref=e37]:
        - heading "Vision & Visibility" [level=4] [ref=e38]
        - paragraph [ref=e39]: I felt like darkwood's mechanic of enemies and objects being invisible outside of the player vision cone was unexplored in the gaming space. Fog of war is present in many places but strangely not in single player experiences with a vision cone. I wanted to expand on this "fear of the dark" feeling and place it in a bayou. I am also going to lightly be "stealing" darkest dungeon's lovecraftian horror. I used custom HLSL shaders and reused blend styles to create a visibility mask.
        - paragraph [ref=e40]: After going to a talk by Henry Hoffman (the creator of Hue) I started to really consider how much more I could connect the gameplay and the art direction. I decided to lean into black and white and I'm experimenting with using red to highlight combat.
    - generic [ref=e41]:
      - generic [ref=e43]: Combat screenshot
      - generic [ref=e44]:
        - heading "Combat & Sound Propagation" [level=4] [ref=e45]
        - paragraph [ref=e46]: Firing a weapon spawns a projectile and a sound ring. The ring alerts nearby enemies using Physics2D.OverlapCircleAll, so every shot is a tactical decision that reveals your position. Per-enemy sensory toggles (deaf, blind) let level design create enemies that only respond to specific stimuli.
        - paragraph [ref=e47]: Water surface effects, procedural reed systems, and environmental interactions are in active development.
    - generic [ref=e48]:
      - generic [ref=e50]: Enemy AI screenshot
      - generic [ref=e51]:
        - heading "Enemy AI System" [level=4] [ref=e52]
        - paragraph [ref=e53]: "Four enemy types, each built with Unity Behavior Graph and custom C# action nodes: a standard patrol unit, a Weeping Angel that freezes when lit, an aquatic enemy that lurks underwater and surfaces to attack, and a ranged variant with layer-filtered projectiles."
        - paragraph [ref=e54]: Enemy detection is independent from player visibility. An enemy can detect the player even when the player can't see it. The EnemyManager checks an array of modular detection components (vision cones, proximity, line-of-sight) at a configurable interval, so new detection types slot in without touching existing code.
  - generic [ref=e56]:
    - paragraph [ref=e57]: 02 - Game Jam
    - heading "Tetrarcana" [level=2] [ref=e58]
    - generic [ref=e59]:
      - img "Tetrarcana gameplay" [ref=e61]
      - generic [ref=e62]:
        - paragraph [ref=e63]: A 1v1 board game where two players compete to cover a shared grid with tetris-shaped pieces. The brief was "light and dark" and also "alchemy". I thought of Splatoon style territory control for light and dark, and merging the tetris pieces together to create new shapes for alchemy. The point of combining is actually also to make "perfect play" harder, since tetris pieces are often easy to slot in. Overlap your opponent's territory claims it. First to roughly 70% coverage wins.
        - paragraph [ref=e64]: Designed the gameplay mechanic, coded it, and collaborated with an artist on visual design and a sound designer on audio. Built in my free time using Godot.
