    - paragraph [ref=e32]:
      - text: 01 - Coffin-Likker
      - generic [ref=e33]: In Development
    - heading "Muk (working title)" [level=2] [ref=e34]
    - generic [ref=e35]:
      - img "Vision system gameplay" [ref=e37]
      - generic [ref=e38]:
        - heading "Vision & Visibility" [level=4] [ref=e39]
        - paragraph [ref=e40]: I felt like darkwood's mechanic of enemies and objects being invisible outside of the player vision cone was unexplored in the gaming space. Fog of war is present in many places but strangely not in single player experiences with a vision cone. I wanted to expand on this "fear of the dark" feeling and place it in a bayou. I am also going to lightly be "stealing" darkest dungeon's lovecraftian horror. I used custom HLSL shaders and reused blend styles to create a visibility mask.
        - paragraph [ref=e41]: After going to a talk by Henry Hoffman (the creator of Hue) I started to really consider how much more I could connect the gameplay and the art direction. I decided to lean into black and white and I'm experimenting with using red to highlight combat.
    - generic [ref=e42]:
      - img "Combat and sound propagation gameplay" [ref=e44]
      - generic [ref=e45]:
        - heading "Communicating Location" [level=4] [ref=e46]
        - paragraph [ref=e47]: In a game where the player has so little information it's important to not make them feel completely lost. I'm experimenting with a push and pull system where certain enemies have a very large awarness range but make noise (which the player can see). And blind enemies who make little noise and the player is at risk of bumping into them. It was important to do this since darkwood usually weaponises the fact that they various rooms and faraway doors that get opened, to communicate this information.
    - generic [ref=e48]:
      - img "Enemy AI gameplay" [ref=e50]
      - generic [ref=e51]:
        - heading "Enemy and Shadows" [level=4] [ref=e52]
        - paragraph [ref=e53]:
          - text: Enemies are highly reactive to the player and call be alerted to the player's location by sound or by proximity. However, some enemies (like the angel enemy seen above) will react to being "seen". This was a useful opportunity for me to create an entire system which informs any object in the game when it's visible to the player. In turn, creating this system allowed me to
          - strong [ref=e54]: vastly reduce
          - text: the cost of casting shadows, as I could just limit shadow casting to only objects that are actually visible to the player, allowing me to have so many shadow casting objects in a single space in the first place.
  - generic [ref=e56]:
    - paragraph [ref=e57]: 02 - Game Jam
    - heading "Tetrarcana" [level=2] [ref=e58]
    - generic [ref=e59]:
      - img "Tetrarcana gameplay" [ref=e61]
      - generic [ref=e62]:
        - paragraph [ref=e63]: A 1v1 board game where two players compete to cover a shared grid with tetris-shaped pieces. The brief was "light and dark" and also "alchemy". I thought of Splatoon style territory control for light and dark, and merging the tetris pieces together to create new shapes for alchemy. The point of combining is actually also to make "perfect play" harder, since tetris pieces are often easy to slot in. Overlap your opponent's territory claims it. First to roughly 70% coverage wins.
        - paragraph [ref=e64]: Designed the gameplay mechanic, coded it, and collaborated with an artist on visual design and a sound designer on audio. Built in my free time using Godot.
