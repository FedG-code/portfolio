  - generic [ref=e38]:
    - paragraph [ref=e39]: 01 - Combat System
    - heading "Combat" [level=2] [ref=e40]
    - generic [ref=e41]:
      - img "Ultimate ability and boss fight gameplay" [ref=e43]
      - generic [ref=e44]:
        - paragraph [ref=e45]: The combat system runs on a finite state machine where each attack is a distinct state node chained into combo sequences. Hitbox activation uses per-state timers rather than animation signals, so attack windows can be tuned independently from animation timing.
        - paragraph [ref=e46]: Input buffering captures player inputs during any attack state. The transition to the next hit only fires when the combo timer drops below a threshold while the buffer flag is set. Combos feel responsive without allowing instant cancels.
    - generic [ref=e47]:
      - img "Berserk mode and laser eye gameplay" [ref=e49]
      - generic [ref=e50]:
        - paragraph [ref=e51]: "The second hit introduces directional branching: neutral input leads to the standard finisher, up-input triggers a launcher that sends enemies airborne for air-combo follow-ups, and horizontal input triggers a forward lunge. The player gets meaningful mid-combo choices without complex input parsing."
        - paragraph [ref=e52]: Berserk mode activates a parallel combo chain with its own state sequence and a heavy finisher, paired with a full character transformation that swaps the moveset entirely.
  - generic [ref=e54]:
    - paragraph [ref=e55]: 02 - Enemies
    - heading "Enemies" [level=2] [ref=e56]
    - generic [ref=e57]:
      - img "Crystal Eater and Star enemy gameplay" [ref=e59]
      - generic [ref=e60]:
        - heading "Generic Enemies" [level=4] [ref=e61]
        - paragraph [ref=e62]: The Crystal Eater and Star enemies share a finite state machine architecture where each state is a child node injected with references to its parent entity and animation players at runtime. The Crystal Eater is the more complex of the two, with ten states, three layered detection ranges, and a cooperative AI system where nearby Crystal Eaters track each other's positions to avoid crowding the player. Damage routing, health, and item drops are handled through reusable components shared across all enemy types, with balance values stored in external resource files.
    - generic [ref=e63]:
      - img "Sword-and-Shield Knight boss fight" [ref=e65]
      - generic [ref=e66]:
        - 'heading "Boss: Sword-and-Shield Knight" [level=4] [ref=e67]'
        - paragraph [ref=e68]: The knight runs on thirteen states and uses weighted randomization to select between thrust attacks, overhead strikes, and a multi-hit combo chain that branches at each stage. The landing after a physics-driven jump attack can lead into a second hit, skip to a finisher, restart, or reset to idle. An attack counter forces the knight into a vulnerable recovery window after every three committed attacks, giving the encounter a learnable rhythm without making it feel scripted.
        - paragraph [ref=e69]: The shield is resolved in the shared damage component by comparing the knight's facing direction against the incoming hit. Attacks on the shielded side emit a distinct signal that triggers shield VFX instead of applying damage, keeping the logic contained rather than spread across states.
  - generic [ref=e71]:
    - paragraph [ref=e72]: 03 - Movement & Traversal
    - heading "Movement" [level=2] [ref=e73]
    - generic [ref=e74]:
      - img "Wall jump gameplay" [ref=e76]
      - generic [ref=e77]:
        - paragraph [ref=e78]: "Built the complete movement suite for a metroidvania that gates exploration behind ability unlocks: run, jump, dash, wall jump, double jump, and ground pound, each from scratch in GDScript."
        - paragraph [ref=e79]: Each ability is a modular addition to the player controller, designed to slot in cleanly as the player progresses and new areas open up.
